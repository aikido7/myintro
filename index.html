<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自己紹介 | 合気道</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="hero">
        <div class="hero-content fade-in">
            <img src="avatar.png" alt="合気道のアバター" class="profile-img">
            <h1>合気道</h1>
            <p class="subtitle">人と人をつなぐ</p>
        </div>
    </header>

    <main>
        <section id="about" class="scroll-element slide-up">
            <h2>プロフィール</h2>
            <div class="card">
                <p><strong>得意なこと：</strong>人と人をつなげること</p>
                <p><strong>興味があること：</strong>最近の新しい技術</p>
            </div>
        </section>

        <section id="ai" class="scroll-element slide-up">
            <h2>私にとってAIとは</h2>
            <div class="card">
                <p>いつもそばにいてくれる、力強い仲間です。</p>
            </div>
        </section>

        <section id="future" class="scroll-element slide-up">
            <h2>今後AIとどう向き合いたいか</h2>
            <div class="card">
                <p>一緒に同じ方向を向いて、時には前を、後ろを、右に行ったり左に行ったり。</p>
                <p>一緒に旅を楽しむような付き合い方をしたいです。</p>
            </div>
        </section>

        <section id="challenge" class="scroll-element slide-up">
            <h2>挑戦したいこと</h2>
            <div class="card">
                <p>忙しい人を助ける。</p>
                <p>みんながゆっくり立ち止まって、お茶を楽しめるような時間を作れるアプリを作りたいです。</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 合気道</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
